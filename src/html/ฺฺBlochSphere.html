<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <title>Bloch Sphere — X/Y/Z</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* ขาว อ่านง่าย + canvas สี่เหลี่ยมจัตุรัสเสมอ */
        html,
        body {
            margin: 0;
            background: #f8fafc;
            color: #0f172a;
            font-family: Inter, system-ui, sans-serif
        }

        .grid {
            max-width: 1200px;
            margin: 22px auto;
            padding: 0 16px;
            display: grid;
            grid-template-columns: minmax(320px, 1fr) 380px;
            gap: 20px
        }

        @media(max-width:960px) {
            .grid {
                grid-template-columns: 1fr
            }
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
            padding: 16px
        }

        .canvasBox {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #0b1020
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block
        }

        .btn {
            appearance: none;
            border: 1px solid #e5e7eb;
            background: #fff;
            color: #0f172a;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer
        }

        .btn.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        .state {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 6px 10px;
            align-items: center
        }

        .label {
            color: #64748b
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem
        }
    </style>
</head>

<body>
    <main class="grid">
        <!-- ซ้าย: Sphere -->
        <section class="card">
            <h1>Bloch Sphere</h1>
            <div class="canvasBox"><canvas id="bloch"></canvas></div>
            <p style="color:#64748b;margin:.6rem 0 0">เมาส์หมุนกล้อง • คีย์ลัด: X / Y / Z</p>
        </section>

        <!-- ขวา: UI -->
        <aside class="card">
            <h1>Gates</h1>
            <div class="row" style="margin-bottom:10px">
                <button class="btn primary" data-gate="X">X</button>
                <button class="btn primary" data-gate="Y">Y</button>
                <button class="btn primary" data-gate="Z">Z</button>
                <button id="reset" class="btn">Reset |0⟩</button>
            </div>

            <h1>Current State</h1>
            <div class="state">
                <div class="label">Superposition</div>
                <div><code id="lbl">|0⟩</code></div>
                <div class="label">Rotation angles</div>
                <div>θ=<span id="th">0</span>° , φ=<span id="ph">0</span>°</div>
                <div class="label">Coords</div>
                <div>x=<span id="x">0</span> &nbsp; y=<span id="y">0</span> &nbsp; z=<span id="z">1</span></div>
            </div>
        </aside>
    </main>

    <script type="module">
        // ⬇️ ดึง “คลาส” ที่คุณให้มา (อยู่ src/scene/)
        import { BlochSphere } from "../scene/BlochSphere.js";
        // ⬇️ ตัวช่วยใช้เกต X/Y/Z (หมุนเวกเตอร์)
        import { applyGate } from "../scene/Quantum_Engin.js";

        // สร้างซีนจากคลาสที่ import มา
        const canvas = document.getElementById("bloch");
        const sphere = new BlochSphere(canvas, {
            background: 0xf8fafc,
            shellColor: 0xcbd5e1,
            gridColor: 0xd1d5db,
            equator: 0x60a5fa,
            arrowColor: 0x2563eb,
        });

        // เริ่มที่ |0⟩
        let v = [0, 0, 1];
        sphere.setBlochVector(v);

        // ฟังก์ชันแปลงเป็นมุม
        const toAngles = ([x, y, z]) => {
            const theta = Math.acos(Math.max(-1, Math.min(1, z)));
            const phi = Math.atan2(y, x);
            return [theta, phi];
        };

        // อัปเดตแผงข้อมูล
        const $ = id => document.getElementById(id);
        function updatePanel() {
            const [x, y, z] = v.map(n => Math.abs(n) < 1e-12 ? 0 : +n.toFixed(3));
            const [th, ph] = toAngles(v);
            $("x").textContent = x; $("y").textContent = y; $("z").textContent = z;
            $("th").textContent = (th * 180 / Math.PI).toFixed(1);
            $("ph").textContent = (ph * 180 / Math.PI).toFixed(1);
            $("lbl").textContent = (z === 1 && x === 0 && y === 0) ? "|0⟩" : (z === -1 && x === 0 && y === 0) ? "|1⟩" : "|ψ⟩";
        }
        updatePanel();

        // ปุ่มเกต
        document.querySelectorAll("[data-gate]").forEach(btn => {
            btn.addEventListener("click", () => {
                v = applyGate(v, btn.dataset.gate);   // ⬅️ เรียกใช้ rotate จาก Quantum_Engin.js
                sphere.setBlochVector(v);             // ⬅️ อัปเดตลูกศรในซีน
                updatePanel();
            });
        });

        // คีย์ลัด
        addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            if (!["x", "y", "z"].includes(k)) return;
            e.preventDefault();
            document.querySelector(`[data-gate="${k.toUpperCase()}"]`)?.click();
        });

        // รีเซ็ต
        document.getElementById("reset").addEventListener("click", () => {
            v = [0, 0, 1]; sphere.setBlochVector(v); updatePanel();
        });

        // render loop
        (function loop() { sphere.resize(); sphere.render(); requestAnimationFrame(loop); })();
    </script>
</body>

</html>
